<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trello MCP - Test UI</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem;
      background: #0d2818;
      color: #eee;
    }
    h1 { color: #61bd4f; margin-bottom: 0.5rem; }
    .subtitle { color: #888; margin-bottom: 2rem; }
    .section {
      background: #1a3d2e;
      border-radius: 8px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }
    .section h2 { margin-top: 0; color: #61bd4f; font-size: 1rem; }
    label { display: block; margin-bottom: 0.25rem; color: #aaa; font-size: 0.9rem; }
    input, textarea, select {
      width: 100%;
      padding: 0.5rem;
      margin-bottom: 1rem;
      border: 1px solid #333;
      border-radius: 4px;
      background: #0a1f15;
      color: #eee;
    }
    textarea { min-height: 80px; font-family: monospace; }
    button {
      background: #61bd4f;
      color: #0d2818;
      border: none;
      padding: 0.6rem 1.2rem;
      border-radius: 4px;
      cursor: pointer;
      font-weight: 600;
    }
    button:hover { background: #519839; }
  </style>
</head>
<body>
  <h1>Trello MCP Test UI</h1>
  <p class="subtitle">Manually test Trello MCP tools</p>

  <div class="section">
    <h2>Credentials</h2>
    <p style="color:#aaa;font-size:0.9rem;">JSON with api_key and token from trello.com/app-key</p>
    <textarea id="creds-json" placeholder='{"api_key":"...","token":"..."}'></textarea>
  </div>

  <div class="section">
    <h2>Tool</h2>
    <select id="tool-name">
      <option value="get_me">get_me</option>
      <option value="list_boards">list_boards</option>
      <option value="get_board">get_board</option>
      <option value="list_lists">list_lists</option>
      <option value="list_cards">list_cards</option>
      <option value="get_card">get_card</option>
      <option value="search_cards">search_cards</option>
      <option value="search_cards_in_board">search_cards_in_board</option>
      <option value="create_card">create_card</option>
      <option value="update_card">update_card</option>
      <option value="move_card">move_card</option>
      <option value="archive_card">archive_card</option>
      <option value="add_comment">add_comment</option>
      <option value="create_list">create_list</option>
    </select>
    <label>Arguments (JSON)</label>
    <textarea id="tool-args">{}</textarea>
    <label><input type="checkbox" id="dry-run"> dry_run</label>
    <label><input type="checkbox" id="confirm"> confirm</label>
    <button onclick="callTool()">Call Tool</button>
    <pre id="result" style="margin-top:1rem;background:#0a1f15;padding:1rem;border-radius:4px;overflow:auto;"></pre>
  </div>

  <script>
    function getCreds() {
      const raw = document.getElementById('creds-json').value.trim();
      if (!raw) return null;
      return JSON.parse(raw);
    }

    async function callTool() {
      const name = document.getElementById('tool-name').value;
      let args = JSON.parse(document.getElementById('tool-args').value || '{}');
      const creds = getCreds();
      if (creds) args.credentials_json = JSON.stringify(creds);
      if (document.getElementById('dry-run').checked) args.dry_run = true;
      if (document.getElementById('confirm').checked) args.confirm = true;

      const payload = {
        jsonrpc: '2.0',
        id: 1,
        method: 'tools/call',
        params: { name, arguments: args },
      };

      const res = await fetch('/mcp/', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Accept': 'application/json, text/event-stream',
        },
        body: JSON.stringify(payload),
      });
      const text = await res.text();
      document.getElementById('result').textContent = text;
    }
  </script>
</body>
</html>
