apiVersion: v1
kind: ConfigMap
metadata:
  name: trello-mcp-main-config
  namespace: mcp-tools
data:
  PORT: "8000"
  LOG_LEVEL: "INFO"
  TRELLO_HTTP_TIMEOUT_SEC: "30"
  CREDENTIAL_VAULT_API_URL: "http://datumbridge-mcp:8081"
---
apiVersion: v1
kind: Service
metadata:
  name: trello-mcp-main
  namespace: mcp-tools
  labels:
    app: trello-mcp-main
spec:
  type: NodePort
  selector:
    app: trello-mcp-main
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      protocol: TCP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: trello-mcp-main
  namespace: mcp-tools
  labels:
    app: trello-mcp-main
spec:
  replicas: 1
  selector:
    matchLabels:
      app: trello-mcp-main
  template:
    metadata:
      labels:
        app: trello-mcp-main
    spec:
      containers:
        - name: tool
          image: trello-mcp:local
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: trello-mcp-main-config
            - secretRef:
                name: trello-mcp-main-secret
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
